<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>HỆ THỐNG QUẢN LÍ SINH VIÊN</h2>
    <div class="container">
        <div class="form-container">
            <h3 id="formHeader">Thêm sinh viên mới</h3>
            <form id="studentForm">
                <input type="hidden" id="formMode" value="ADD">
                <p><b>Thông tin cơ bản</b></p>
                <div class="form-group">
                    <label>Mã số SV (ID): </label>
                    <input type="text" id="stuId" required>
                </div>
                <div class="form-group">
                    <label>Họ và tên: </label>
                    <input type="text" id="stuName" required>
                </div>
                <div class="form-group">
                    <label>Mã lớp:</label>
                    <input type="text" id="stuClassId" required>
                </div>
                <div class="form-group">
                    <label>Tuổi:</label>
                    <input type="number" id="stuAge" min="1" required>
                </div>
                <div class="form-group">
                    <label>Giới tính:</label>
                    <select id="stuGender" required>
                        <option value="">-- Chọn giới tính --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Địa chỉ:</label>
                    <input type="text" id="stuAddress" required>
                </div>
                <p><b>Cập nhật điểm</b></p>
                <div class="score-group">
                    <div>
                        <label>Toán:</label>
                        <input type="number" id="scoreM" min="0" max="10" step="0.1" value="0">
                    </div>
                    <div>
                        <label>Văn:</label>
                        <input type="number" id="scoreV" min="0" max="10" step="0.1" value="0">
                    </div>
                    <div>
                        <label>Anh:</label>
                        <input type="number" id="scoreA" min="0" max="10" step="0.1" value="0">
                    </div>
                </div>
                <div class="button-group">
                    <button type="submit" id="btnSubmit">Lưu</button>
                    <button type="button" id="btnCancel" class="hidden" onclick="resetToAddMode()">Hủy</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3>Danh sách học sinh</h3>
                <button type="button" onclick="fetchStudents()">Tải lại bảng</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Mã lớp</th>
                        <th>Toán</th>
                        <th>Văn</th>
                        <th>Anh</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
